name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run package:skill
      - uses: actions/upload-artifact@v4
        with:
          name: story-handdrawn-studio-skill-${{ matrix.os }}
          path: release/story-handdrawn-studio-skill-*.zip
          if-no-files-found: error
