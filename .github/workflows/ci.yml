name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run package:skill
      - uses: actions/upload-artifact@v4
        with:
          name: story-handdrawn-studio-skill
          path: release/story-handdrawn-studio-skill-*.zip
          if-no-files-found: error
