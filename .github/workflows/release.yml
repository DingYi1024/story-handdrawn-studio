name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify tag matches VERSION
        shell: bash
        run: test "v$(tr -d '\r\n' < VERSION)" = "$GITHUB_REF_NAME"
      - run: npm ci
      - run: npm run check
      - run: npm run package:skill
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/story-handdrawn-studio-skill-*.zip --title "$GITHUB_REF_NAME" --generate-notes
